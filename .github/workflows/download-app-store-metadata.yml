name: Download App Store Metadata

# 用途: App Store Connect から既存のメタデータを fastlane/metadata/ にダウンロードして PR を作成
# 用法: Stage 1c の 1 回きり bootstrap、または ASC で直接編集した内容をリポジトリに同期したい場合
# トリガー: workflow_dispatch のみ (手動実行)
#
# 動作:
#   1. fastlane deliver download_metadata で ASC からテキストメタデータをダウンロード
#   2. fastlane/metadata/ 以下に差分があれば feature ブランチに commit → push → PR 作成
#   3. PR は人間がレビューして手動で merge する
#
# 安全設計:
#   - submit_for_review や upload は一切しない (read-only operation)
#   - スクリーンショットはダウンロードしない (テキストのみ)
#   - PR を作成するだけで直接 main にコミットしない

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  download:
    name: Download ASC metadata and open PR
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Ruby + bundler cache
        uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1.300.0
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Decode ASC API Key
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          mkdir -p fastlane
          if [ -z "${ASC_API_KEY_P8_BASE64}" ]; then
            echo "::error::Secret ASC_API_KEY_P8_BASE64 is not set"
            exit 1
          fi
          echo "${ASC_API_KEY_P8_BASE64}" | base64 --decode > fastlane/AuthKey.p8
          if ! head -n1 fastlane/AuthKey.p8 | grep -q "BEGIN PRIVATE KEY"; then
            echo "::error::Decoded AuthKey.p8 is not a valid PEM"
            exit 1
          fi

      - name: Create API key JSON for fastlane deliver
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          # fastlane deliver download_metadata は ENV 経由の API Key を読まない (known issue)。
          # JSON ファイルとして渡す必要がある。
          KEY_CONTENT=$(cat fastlane/AuthKey.p8)
          cat > fastlane/api_key.json <<APIKEY
          {
            "key_id": "${ASC_API_KEY_ID}",
            "issuer_id": "${ASC_API_KEY_ISSUER_ID}",
            "key": $(echo "$KEY_CONTENT" | jq -Rs .),
            "duration": 1200,
            "in_house": false
          }
          APIKEY
          echo "API key JSON created (key_id: ${ASC_API_KEY_ID:0:4}...)"

      - name: Download metadata via fastlane deliver
        run: |
          bundle exec fastlane deliver download_metadata \
            --app_identifier com.dooooraku.repolog \
            --api_key_path fastlane/api_key.json \
            --force

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f fastlane/AuthKey.p8
          rm -f fastlane/api_key.json

      - name: Show downloaded files
        run: |
          echo "## Downloaded files" >> "$GITHUB_STEP_SUMMARY"
          if [ -d fastlane/metadata ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            find fastlane/metadata -type f -name '*.txt' | sort >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::fastlane/metadata/ directory was not created. download_metadata may have failed."
            exit 1
          fi

      - name: Detect changes
        id: changes
        run: |
          git add fastlane/metadata/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ダウンロードしたメタデータは現在のブランチと同じです (差分なし)"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            git diff --cached --stat >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create branch + commit + open PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="bot/fastlane-metadata-download-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -m "chore(metadata): bootstrap fastlane/metadata from App Store Connect (Stage 1c)

          Auto-generated by .github/workflows/download-app-store-metadata.yml

          Downloaded existing ASC metadata via:
            bundle exec fastlane deliver download_metadata --app_identifier com.dooooraku.repolog

          Stage 1c bootstrap. Stage 2 will add 17 additional locales with
          persona-driven copy."
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(metadata): bootstrap fastlane/metadata from ASC (Stage 1c)" \
            --body "$(cat <<'PRBODY'
          ## Summary

          Auto-generated by [Download App Store Metadata](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.

          \`fastlane deliver download_metadata\` was executed against App Store Connect and downloaded the existing localized metadata for:
          - \`fastlane/metadata/ja/\` (primary language)
          - \`fastlane/metadata/en-US/\` (added in Stage 1b)
          - Plus non-localized files (\`copyright.txt\`, \`primary_category.txt\`, etc.)

          ## Test plan

          - [ ] Inspect downloaded text files for correctness (no garbled chars, no placeholders)
          - [ ] Confirm the existing 'Push App Store Metadata' workflow's precheck passes on this PR
          - [ ] Merge to main

          ## Next steps (Stage 2)

          Claude generates the remaining 17 locales with persona-driven copy.

          🤖 Auto-generated by GitHub Actions
          PRBODY
          )"

      - name: Job summary (final)
        if: always()
        run: |
          {
            echo ""
            echo "## Result"
            echo ""
            if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
              echo "- ✅ Metadata downloaded and PR created"
              echo "- Actions タブで作成された PR をレビュー → main にマージしてください"
            else
              echo "- ℹ️ No changes detected — ASC のメタデータと main が既に同期しています"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
