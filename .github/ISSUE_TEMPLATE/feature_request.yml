name: "Feature request（機能要望）"
description: "新機能・改善の提案"
title: "[Feat]: "
labels: ["enhancement"]
type: "feature"
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: "事前確認"
      options:
        - label: "product_strategy.md を確認済み"
          required: true
        - label: "受け入れ条件（AC）を合否判定できる形で書きます"
          required: true
        - label: "やること／やらないことでスコープを定義します"
          required: true

  - type: dropdown
    id: priority
    attributes:
      label: "優先度"
      options:
        - "P0（緊急：収益・致命的UX・継続利用に影響）"
        - "P1（高：主要価値を押し上げる）"
        - "P2（通常：価値はあるが今すぐではない）"
        - "P3（低：後でよい）"
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: "背景・目的"
      description: "なぜこの機能が必要か。課題と期待する効果。関連仕様があればリンクを含める。"
      placeholder: |
        背景：
        目的：
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "提案内容"
      description: "何を追加・変更するか。画面・導線・データなど。"
      placeholder: |
        -
        -
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: "スコープ"
      placeholder: |
        やること：
        -
        やらないこと：
        -
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "受け入れ条件"
      description: "合否判定できる条件で記述する。"
      placeholder: |
        - [ ] AC1:
        - [ ] AC2:
        - [ ] AC3:
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: "リスク"
      description: "想定リスクとロールバック方針（なければ空でOK）。"
      placeholder: |
        想定リスク：
        戻し方：
    validations:
      required: false
