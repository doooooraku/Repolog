name: "Bug report（不具合）"
description: "再現可能な不具合を報告する"
title: "[Bug]: "
labels: ["bug"]
type: "bug"
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: "事前確認"
      options:
        - label: "同じ内容のIssueが無いか検索しました"
          required: true
        - label: "再現できることを確認しました"
          required: true
        - label: "受け入れ条件（AC）を記載します"
          required: true

  - type: dropdown
    id: priority
    attributes:
      label: "優先度"
      options:
        - "P2（通常：回避可能）"
        - "P0（緊急：起動不能/データ消失/課金が壊れる）"
        - "P1（高：主要機能が使えない）"
        - "P3（低：軽微/見た目）"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: "現象"
      description: "何が起きたかを簡潔に。"
      placeholder: |
        例：設定画面で言語を切り替えるとボタンが画面外にはみ出す
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "再現手順"
      description: "番号付きで。誰でも同じ手順で再現できる粒度で書く。"
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: "期待する結果 / 実際の結果"
      placeholder: |
        期待：ボタンが画面内に収まり、タップできる
        実際：ボタンが画面外にはみ出し、タップできない
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "環境"
      description: "OS・端末・アプリバージョンなどを1行で。"
      placeholder: "例：Android 15 / Pixel 8a / v1.2.0 (45)"
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: "証拠"
      description: "スクリーンショット・動画・ログなど、あれば添付。"
      placeholder: |
        - スクショ:
        - 動画:
        - logcat（該当行）:
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: "受け入れ条件（AC）"
      description: "合否を判定できる条件を列挙する。"
      placeholder: |
        - [ ] AC1:
        - [ ] AC2:
        - [ ] AC3:
    validations:
      required: true
